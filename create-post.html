<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Create Post - ACITY Connect</title>
  <link rel="stylesheet" href="style.css"/>
</head>

<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <h2>ACITY Connect</h2>

    <div class="nav-links">
      <a href="dashboard.html">Dashboard</a>
      <a href="index.html">Home</a>
      <a href="login.html">Login</a>
    </div>
  </nav>

  <!-- CREATE POST SECTION -->
  <section class="section">

    <h2>Create a New Listing</h2>
    <p>Post an item or skill for other students to see.</p>

    <div class="form-card">

      <input type="text" id="title" placeholder="Title (e.g. Laptop for sale)" required />

      <textarea id="description" placeholder="Write a short description..." required></textarea>

      <input type="text" id="price" placeholder="Price (or write 'Free')" />

      <select id="category" required>
        <option value="">Select Category</option>
        <option value="Item">Item</option>
        <option value="Skill">Skill</option>
        <option value="Service">Service</option>
      </select>

      <select id="status">
        <option value="Available">Available</option>
        <option value="Sold">Sold</option>
        <option value="Unavailable">Unavailable</option>
      </select>

      <button onclick="createPost()">Post Listing</button>

    </div>

  </section>

  <!-- FOOTER -->
  <footer>
    <p>© 2026 ACITY Connect</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
